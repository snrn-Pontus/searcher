<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Hit Counter</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7f8;
            --surface: #ffffff;
            --surface-muted: #eef2f3;
            --text: #172026;
            --muted: #65727a;
            --line: #d7dee2;
            --accent: #0f766e;
            --accent-strong: #0b5f59;
            --warning: #9a4d00;
            --danger: #b42318;
            --shadow: 0 18px 55px rgba(23, 32, 38, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        main {
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
            padding: 44px 0;
        }

        .topbar {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 28px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.75rem);
            line-height: 1;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 12px 0 0;
            max-width: 660px;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.55;
        }

        .status-pill {
            flex: 0 0 auto;
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--muted);
            background: var(--surface);
            font-size: 0.875rem;
        }

        .search-panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 18px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 0.875rem;
            font-weight: 650;
        }

        input {
            width: 100%;
            min-height: 48px;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 0 14px;
            color: var(--text);
            font: inherit;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.16);
        }

        button {
            align-self: end;
            min-height: 48px;
            border: 0;
            border-radius: 6px;
            padding: 0 20px;
            background: var(--accent);
            color: white;
            font: inherit;
            font-weight: 750;
            cursor: pointer;
        }

        button:hover { background: var(--accent-strong); }
        button:disabled { cursor: wait; opacity: 0.65; }

        .message {
            display: none;
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 6px;
            background: var(--surface-muted);
            color: var(--muted);
            line-height: 1.45;
        }

        .message.visible { display: block; }
        .message.error { color: var(--danger); background: #fff0ee; }
        .message.warning { color: var(--warning); background: #fff7ed; }

        .results {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            margin-top: 22px;
        }

        .provider-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px;
        }

        .provider-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: start;
        }

        .provider-name {
            margin: 0;
            font-size: 1rem;
        }

        .provider-state {
            flex: 0 0 auto;
            color: var(--muted);
            font-size: 0.8rem;
        }

        .provider-state.empty { color: var(--muted); }
        .provider-state.failed { color: var(--warning); }
        .provider-state.unavailable { color: var(--danger); }

        .hit-count {
            margin: 18px 0 4px;
            font-size: clamp(2rem, 4vw, 3.25rem);
            line-height: 1;
            font-weight: 800;
        }

        .hit-label {
            color: var(--muted);
            font-size: 0.875rem;
        }

        details {
            margin-top: 18px;
            border-top: 1px solid var(--line);
            padding-top: 14px;
        }

        summary {
            cursor: pointer;
            color: var(--accent-strong);
            font-weight: 700;
        }

        table {
            width: 100%;
            margin-top: 12px;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            padding: 10px 0;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        th:last-child, td:last-child { text-align: right; }
        .term-error { color: var(--warning); }

        @media (max-width: 760px) {
            main { width: min(100% - 24px, 1080px); padding: 24px 0; }
            .topbar { display: block; }
            .status-pill { display: inline-block; margin-top: 18px; }
            form { grid-template-columns: 1fr; }
            button { width: 100%; }
            .results { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<main>
    <section class="topbar" aria-labelledby="page-title">
        <div>
            <h1 id="page-title">Search Hit Counter</h1>
            <p class="subtitle">Enter one or more words to compare total hit counts across the configured search providers.</p>
        </div>
        <div id="status" class="status-pill">Ready</div>
    </section>

    <section class="search-panel">
        <form id="search-form">
            <div>
                <label for="query">Search words</label>
                <input id="query" name="query" type="search" autocomplete="off" placeholder="Hello world" maxlength="500" required>
            </div>
            <button id="submit" type="submit">Search</button>
        </form>
        <div id="message" class="message" role="status"></div>
    </section>

    <section id="results" class="results" aria-live="polite"></section>
</main>

<script>
    const form = document.getElementById('search-form');
    const query = document.getElementById('query');
    const submit = document.getElementById('submit');
    const statusEl = document.getElementById('status');
    const message = document.getElementById('message');
    const results = document.getElementById('results');

    const formatter = new Intl.NumberFormat(undefined, { maximumFractionDigits: 0 });

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const value = query.value.trim();
        if (!value) {
            showMessage('Enter one or more words before searching.', 'error');
            query.focus();
            return;
        }

        setBusy(true);
        showMessage('Searching providers...', '');
        results.innerHTML = '';

        try {
            const response = await fetch('/api/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: value })
            });

            if (!response.ok) {
                const problem = await response.json().catch(() => ({}));
                throw new Error(problem.detail || problem.title || 'The search request failed.');
            }

            const data = await response.json();
            renderResults(data);
            const failedProviders = data.providers.filter(provider => !provider.succeeded).length;
            if (failedProviders > 0) {
                showMessage(`${failedProviders} provider result included errors. Successful hit counts are still shown.`, 'warning');
            } else {
                showMessage(`Searched ${data.terms.length} word${data.terms.length === 1 ? '' : 's'} in ${data.elapsedMilliseconds} ms.`, '');
            }
        } catch (error) {
            showMessage(error.message, 'error');
        } finally {
            setBusy(false);
        }
    });

    function setBusy(isBusy) {
        submit.disabled = isBusy;
        submit.textContent = isBusy ? 'Searching...' : 'Search';
        statusEl.textContent = isBusy ? 'Working' : 'Ready';
    }

    function showMessage(text, level) {
        message.textContent = text;
        message.className = `message visible ${level}`.trim();
    }

    function getSuccessfulTermCount(provider) {
        return (provider.terms ?? []).filter(term => term.error == null && term.hits != null).length;
    }

    function getProviderStateLabel(provider) {
        const successfulTermCount = getSuccessfulTermCount(provider);
        const termCount = (provider.terms ?? []).length;

        if (successfulTermCount === termCount && provider.totalHits === 0) {
            return 'No hits';
        }

        if (successfulTermCount === termCount) {
            return 'Complete';
        }

        return successfulTermCount > 0 ? 'Partial' : 'Unavailable';
    }

    function getProviderStateClass(provider) {
        const successfulTermCount = getSuccessfulTermCount(provider);
        const termCount = (provider.terms ?? []).length;

        if (successfulTermCount === termCount) {
            return provider.totalHits === 0 ? 'empty' : '';
        }

        return successfulTermCount > 0 ? 'failed' : 'unavailable';
    }

    function renderResults(data) {
        results.innerHTML = data.providers.map(provider => `
            <article class="provider-card">
                <div class="provider-header">
                    <h2 class="provider-name">${escapeHtml(provider.provider)}</h2>
                    <span class="provider-state ${getProviderStateClass(provider)}">${getProviderStateLabel(provider)}</span>
                </div>
                <div class="hit-count">${formatter.format(provider.totalHits)}</div>
                <div class="hit-label">total hits</div>
                ${provider.error ? `<p class="message visible warning">${escapeHtml(provider.error)}</p>` : ''}
                <details>
                    <summary>Per-word results</summary>
                    <table>
                        <thead><tr><th>Word</th><th>Source</th><th>Hits</th></tr></thead>
                        <tbody>
                            ${provider.terms.map(term => `
                                <tr>
                                    <td>${escapeHtml(term.term)}</td>
                                    <td>${term.fromCache ? 'Cache' : 'Remote'}</td>
                                    <td class="${term.error ? 'term-error' : ''}">${term.error ? escapeHtml(term.error) : formatter.format(term.hits)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </details>
            </article>
        `).join('');
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }
</script>
</body>
</html>
